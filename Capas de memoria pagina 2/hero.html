<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hero Aéreo — Capas de Memoria</title>
<style>
/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0906}

/* ═══════════════════════════════
   CONTENEDOR HERO
═══════════════════════════════ */
.hero{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ═══════════════════════════════
   IMAGEN BASE — aérea, ligeramente
   más grande para permitir drift suave
═══════════════════════════════ */
.aerial-base{
  position:absolute;
  /* 5% más grande en cada lado para margen de movimiento */
  inset:-5%;
  width:110%;height:110%;
  object-fit:cover;
  object-position:center;
  /* Filtro documental cinematográfico */
  filter:
    saturate(0.82)
    contrast(1.06)
    brightness(0.92)
    sepia(0.12);
  /* Drift muy lento de la cámara — simula estabilizador */
  animation: cameraDrift 32s ease-in-out infinite alternate;
  will-change:transform;
}

@keyframes cameraDrift {
  0%   { transform:translate(0,0) scale(1); }
  25%  { transform:translate(0.4%,-0.3%) scale(1.005); }
  50%  { transform:translate(-0.3%,0.4%) scale(1.008); }
  75%  { transform:translate(0.2%,0.2%) scale(1.003); }
  100% { transform:translate(-0.2%,-0.2%) scale(1); }
}

/* ═══════════════════════════════
   CAPA DE NIEBLA ATMOSFÉRICA
   Bruma suave entre tejados
═══════════════════════════════ */
.haze{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 30% at 50% 60%,
      rgba(200,185,160,0.06) 0%,
      transparent 70%),
    radial-gradient(ellipse 40% 20% at 20% 40%,
      rgba(180,170,150,0.04) 0%,
      transparent 60%),
    radial-gradient(ellipse 50% 25% at 80% 70%,
      rgba(190,180,155,0.04) 0%,
      transparent 65%);
  animation: hazeShift 18s ease-in-out infinite alternate;
  pointer-events:none;
}

@keyframes hazeShift {
  0%   { opacity:0.7;transform:translate(0,0); }
  50%  { opacity:1;transform:translate(1%,0.5%); }
  100% { opacity:0.6;transform:translate(-0.5%,-0.3%); }
}

/* ═══════════════════════════════
   NUBES — 3 capas en altitudes distintas
   Movimiento horizontal lento
═══════════════════════════════ */
.clouds-layer{
  position:absolute;
  width:250%;height:100%;
  top:0;left:-150%;
  pointer-events:none;
}

/* Capa 1 — nubes altas, muy difusas */
.cloud-hi{
  animation: cloudDriftHi 80s linear infinite;
}
/* Capa 2 — nubes medias */
.cloud-mid{
  animation: cloudDriftMid 55s linear infinite;
  animation-delay:-20s;
}
/* Capa 3 — nubes bajas, más opacas */
.cloud-lo{
  animation: cloudDriftLo 40s linear infinite;
  animation-delay:-10s;
}

@keyframes cloudDriftHi {
  from{transform:translateX(0)}
  to  {transform:translateX(40%)}
}
@keyframes cloudDriftMid {
  from{transform:translateX(0)}
  to  {transform:translateX(50%)}
}
@keyframes cloudDriftLo {
  from{transform:translateX(0)}
  to  {transform:translateX(60%)}
}

/* ═══════════════════════════════
   SOMBRAS DE NUBES
   Manchas que cruzan el suelo
═══════════════════════════════ */
.shadow-layer{
  position:absolute;inset:0;
  pointer-events:none;overflow:hidden;
}

.cloud-shadow{
  position:absolute;
  border-radius:50%;
  background:rgba(10,8,4,0.12);
  filter:blur(40px);
  animation:shadowDrift linear infinite;
}

.cs1{
  width:38%;height:18%;top:15%;left:-40%;
  animation-duration:28s;
  animation-delay:0s;
  border-radius:60% 40% 50% 55%;
}
.cs2{
  width:25%;height:12%;top:45%;left:-30%;
  animation-duration:22s;
  animation-delay:-8s;
  border-radius:45% 55% 40% 60%;
  background:rgba(10,8,4,0.09);
}
.cs3{
  width:32%;height:15%;top:65%;left:-35%;
  animation-duration:35s;
  animation-delay:-15s;
  border-radius:55% 45% 60% 40%;
  background:rgba(10,8,4,0.08);
}
.cs4{
  width:20%;height:10%;top:30%;left:-25%;
  animation-duration:18s;
  animation-delay:-5s;
  border-radius:50% 50% 55% 45%;
  background:rgba(10,8,4,0.07);
}

@keyframes shadowDrift {
  from{transform:translateX(0)}
  to  {transform:translateX(calc(100vw + 40%))}
}

/* ═══════════════════════════════
   CANVAS para pájaros y movimiento árbol
═══════════════════════════════ */
#canvas-atmosfera{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
}

/* ═══════════════════════════════
   VIÑETA CINEMATOGRÁFICA
═══════════════════════════════ */
.vignette{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at center,
      transparent 55%,
      rgba(8,7,5,0.45) 100%);
  pointer-events:none;
}

/* ═══════════════════════════════
   DEGRADADO INFERIOR (para superponer texto)
═══════════════════════════════ */
.gradient-bottom{
  position:absolute;
  bottom:0;left:0;right:0;
  height:45%;
  background:linear-gradient(
    to bottom,
    transparent 0%,
    rgba(10,9,7,0.55) 55%,
    rgba(10,9,7,0.85) 100%
  );
  pointer-events:none;
}

/* ═══════════════════════════════
   CONTENIDO DE TEXTO
═══════════════════════════════ */
.hero-content{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:3rem 3rem 4rem;
  z-index:10;
}

.hero-eyebrow{
  font-family:'Courier New',monospace;
  font-size:clamp(0.55rem,1vw,0.7rem);
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:rgba(235,225,205,0.45);
  margin-bottom:0.75rem;
  display:flex;align-items:center;gap:0.75rem;
}
.hero-eyebrow::before{
  content:'';display:block;
  width:28px;height:1px;
  background:rgba(235,225,205,0.3);
}

.hero-titulo{
  font-family:'Barlow Condensed','Arial Narrow',sans-serif;
  font-size:clamp(3.5rem,9vw,7.5rem);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.01em;
  line-height:0.88;
  color:#f2ede4;
  margin-bottom:1.25rem;
  text-shadow:0 4px 40px rgba(0,0,0,0.4);
}

.hero-subtitulo{
  font-family:'Inter',sans-serif;
  font-size:clamp(0.85rem,1.5vw,1rem);
  font-weight:300;
  line-height:1.65;
  color:rgba(235,225,205,0.65);
  max-width:44ch;
  margin-bottom:2rem;
}

.hero-cta{
  display:inline-flex;align-items:center;gap:0.75rem;
  font-family:'Barlow Condensed','Arial Narrow',sans-serif;
  font-size:0.9rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  color:#1a1917;
  background:#f2ede4;
  padding:0.85rem 1.75rem;
  border-radius:4px;
  text-decoration:none;
  transition:background 0.2s,transform 0.2s;
}
.hero-cta:hover{
  background:#fffdf8;
  transform:translateY(-2px);
}
.hero-cta svg{width:16px;height:16px}

/* ═══════════════════════════════
   COORDENADAS (detalle documental)
═══════════════════════════════ */
.coords{
  position:absolute;
  top:1.5rem;right:1.5rem;
  font-family:'Courier New',monospace;
  font-size:0.6rem;
  letter-spacing:0.12em;
  color:rgba(235,225,205,0.25);
  text-align:right;
  line-height:1.5;
}

/* Fuentes */
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@300;400&display=swap');
</style>
</head>
<body>

<div class="hero" role="img" aria-label="Vista aérea del Paseo del Buen Pastor — Córdoba, Argentina">

  <!-- IMAGEN BASE -->
  <img
    class="aerial-base"
    src="img/aerial_hero.png"
    alt="Vista aérea cinematográfica del Paseo del Buen Pastor"
    draggable="false"
  />

  <!-- NIEBLA ATMOSFÉRICA -->
  <div class="haze" aria-hidden="true"></div>

  <!-- NUBES SVG — capas a distintas altitudes -->
  <svg class="clouds-layer cloud-hi" viewBox="0 0 2500 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <filter id="blur-hi"><feGaussianBlur stdDeviation="18"/></filter>
      <filter id="blur-mid"><feGaussianBlur stdDeviation="12"/></filter>
    </defs>
    <!-- Nube 1 -->
    <ellipse cx="600"  cy="180" rx="320" ry="60"  fill="rgba(240,235,225,0.07)" filter="url(#blur-hi)"/>
    <ellipse cx="720"  cy="160" rx="180" ry="40"  fill="rgba(245,240,230,0.05)" filter="url(#blur-hi)"/>
    <!-- Nube 2 -->
    <ellipse cx="1600" cy="120" rx="280" ry="50"  fill="rgba(238,232,220,0.06)" filter="url(#blur-hi)"/>
    <ellipse cx="1750" cy="105" rx="150" ry="35"  fill="rgba(242,237,228,0.04)" filter="url(#blur-hi)"/>
    <!-- Nube 3 -->
    <ellipse cx="2200" cy="200" rx="350" ry="70"  fill="rgba(235,230,218,0.06)" filter="url(#blur-hi)"/>
  </svg>

  <svg class="clouds-layer cloud-mid" viewBox="0 0 2500 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <filter id="blur-mid2"><feGaussianBlur stdDeviation="10"/></filter>
    </defs>
    <ellipse cx="400"  cy="300" rx="220" ry="45"  fill="rgba(230,222,208,0.05)" filter="url(#blur-mid2)"/>
    <ellipse cx="1100" cy="250" rx="190" ry="38"  fill="rgba(228,220,205,0.04)" filter="url(#blur-mid2)"/>
    <ellipse cx="1900" cy="350" rx="260" ry="52"  fill="rgba(232,224,210,0.055)" filter="url(#blur-mid2)"/>
  </svg>

  <svg class="clouds-layer cloud-lo" viewBox="0 0 2500 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <filter id="blur-lo"><feGaussianBlur stdDeviation="6"/></filter>
    </defs>
    <ellipse cx="800"  cy="450" rx="140" ry="28"  fill="rgba(220,212,198,0.04)" filter="url(#blur-lo)"/>
    <ellipse cx="2000" cy="500" rx="170" ry="33"  fill="rgba(218,210,195,0.04)" filter="url(#blur-lo)"/>
  </svg>

  <!-- SOMBRAS DE NUBES sobre el suelo -->
  <div class="shadow-layer" aria-hidden="true">
    <div class="cloud-shadow cs1"></div>
    <div class="cloud-shadow cs2"></div>
    <div class="cloud-shadow cs3"></div>
    <div class="cloud-shadow cs4"></div>
  </div>

  <!-- CANVAS — pájaros animados + micro-movimiento árboles -->
  <canvas id="canvas-atmosfera" aria-hidden="true"></canvas>

  <!-- VIÑETA -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- DEGRADADO PARA TEXTO -->
  <div class="gradient-bottom" aria-hidden="true"></div>

  <!-- CONTENIDO -->
  <div class="hero-content">
    <p class="hero-eyebrow">Córdoba · Argentina · 1868</p>
    <h1 class="hero-titulo">CAPAS DE<br>MEMORIA</h1>
    <p class="hero-subtitulo">
      Un lugar. Múltiples memorias. Recorrí las capas históricas
      del Paseo del Buen Pastor y descubrí las historias
      que sus muros guardan desde 1868.
    </p>
    <a href="mapa.html" class="hero-cta">
      Comenzar recorrido
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
  </div>

  <!-- COORDENADAS -->
  <div class="coords" aria-hidden="true">
    31°24'37" S<br>64°11'09" O<br>Paseo del Buen Pastor
  </div>

</div><!-- /hero -->

<script>
/* ═══════════════════════════════════════════════════
   CANVAS — Pájaros distantes + tremulación árboles
═══════════════════════════════════════════════════ */
(function(){
'use strict';

var canvas = document.getElementById('canvas-atmosfera');
var ctx    = canvas.getContext('2d');
var W, H;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── PÁJAROS ──────────────────────────────── */
/* Muy pequeños, muy distantes, naturales.
   No se acercan a la cámara. Movimiento de ala realista. */

function crearPajaro(){
  var lado = Math.random() > 0.5 ? 'izq' : 'der';
  return {
    x:    lado === 'izq' ? -30 : W + 30,
    y:    H * (0.08 + Math.random() * 0.35),     /* parte alta — altitude */
    vx:   lado === 'izq'
            ? 0.4 + Math.random() * 0.5
            : -(0.4 + Math.random() * 0.5),
    vy:   (Math.random() - 0.5) * 0.15,
    fase: Math.random() * Math.PI * 2,
    vel:  0.04 + Math.random() * 0.03,            /* velocidad de aleteo */
    tam:  1.2 + Math.random() * 1.0,              /* tamaño: muy pequeño */
    opac: 0.25 + Math.random() * 0.25,            /* semi-transparente = distancia */
    tipo: Math.floor(Math.random() * 3),          /* 3 formas de pájaro */
  };
}

var pajaros = [];

/* Aparición escalonada: primer pájaro a los 3s */
var spawnTimers = [3, 12, 22, 38, 52, 68];
var spawnIdx    = 0;
var t0          = Date.now();

function dibujarPajaro(p, t){
  p.fase += p.vel;
  var aleteo = Math.sin(p.fase);
  var tam    = p.tam;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.globalAlpha = p.opac;
  ctx.strokeStyle = '#1a1512';
  ctx.lineWidth   = 0.7;
  ctx.lineCap     = 'round';

  /* Silueta de pájaro a distancia: forma de M/W con alas */
  var va = aleteo * 3 * tam; /* amplitud de aleteo */
  ctx.beginPath();
  ctx.moveTo(-4*tam, va * 0.5);
  ctx.quadraticCurveTo(-2*tam, -va, 0, va * 0.2);
  ctx.quadraticCurveTo( 2*tam, -va, 4*tam, va * 0.5);
  ctx.stroke();
  ctx.restore();
}

/* ── PARTÍCULAS DE BRISA ──────────────────── */
/* Pequeños puntos/líneas que simulan calor
   y movimiento de aire sobre los tejados */
var particulas = [];
for(var i = 0; i < 18; i++){
  particulas.push({
    x:     Math.random() * 1.2,      /* 0-1.2 en proporción W */
    y:     0.3 + Math.random() * 0.5,
    opac:  0,
    maxOp: 0.06 + Math.random() * 0.06,
    vel:   0.00008 + Math.random() * 0.00012,
    fase:  Math.random() * Math.PI * 2,
    tam:   1 + Math.random() * 2,
  });
}

/* ── LOOP ─────────────────────────────────── */
function loop(){
  ctx.clearRect(0, 0, W, H);

  var ahora  = Date.now();
  var elapsed = (ahora - t0) / 1000;

  /* Aparición de pájaros según timers */
  if(spawnIdx < spawnTimers.length && elapsed >= spawnTimers[spawnIdx]){
    /* Aparece un grupo de 2-4 pájaros */
    var n = 2 + Math.floor(Math.random() * 3);
    for(var g = 0; g < n; g++){
      var b = crearPajaro();
      /* Variación dentro del grupo */
      b.y += (Math.random() - 0.5) * 25;
      b.x += (Math.random() - 0.5) * 20;
      b.fase = Math.random() * Math.PI * 2; /* aleteo desincronizado */
      pajaros.push(b);
    }
    spawnIdx++;
  }

  /* Dibujar y mover pájaros */
  pajaros = pajaros.filter(function(p){
    p.x += p.vx;
    p.y += p.vy;
    /* Ligero movimiento ondulante vertical */
    p.y += Math.sin(p.fase * 0.3) * 0.08;
    dibujarPajaro(p, elapsed);
    /* Eliminar cuando salen del frame (con margen) */
    return p.x > -50 && p.x < W + 50 && p.y > -50 && p.y < H + 50;
  });

  /* Partículas de calor/brisa */
  particulas.forEach(function(p){
    p.fase += p.vel * 60;
    p.opac  = p.maxOp * (0.5 + 0.5 * Math.sin(p.fase));
    var px  = (p.x + Math.sin(p.fase * 0.4) * 0.01) * W;
    var py  = p.y * H + Math.sin(p.fase * 0.7 + 1) * 8;
    ctx.save();
    ctx.globalAlpha = p.opac;
    ctx.fillStyle   = 'rgba(220,200,170,1)';
    ctx.beginPath();
    ctx.arc(px, py, p.tam * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    /* Reiniciar partícula si se va muy lejos */
    if(p.fase > Math.PI * 200) p.fase = 0;
  });

  requestAnimationFrame(loop);
}

/* Verificar reduced-motion */
var reducido = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!reducido) loop();

})();
</script>

</body>
</html>
